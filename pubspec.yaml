name: flutter_riverpod_base
description: "Flutter app template with Riverpod state management (replaces legacy Provider stack)."
publish_to: 'none' # Prevent publishing to pub.dev

version: 1.0.0+1

environment:
  sdk: ">=3.1.0 <4.0.0" # Flutter 3.x compatible

dependencies:
  flutter:
    sdk: flutter

  # iOS-style Cupertino icons
  cupertino_icons: ^1.0.8

  # Networking
  dio: ^5.9.0
  http: ^1.5.0

  # Local database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Date/time formatting
  intl: ^0.20.2

  # Functional programming helpers
  dartz: ^0.10.1

  # Dependency injection
  get_it: ^8.2.0

  # State management
  flutter_riverpod: ^2.6.1

  # Value equality
  equatable: ^2.0.7

  # SVG support
  flutter_svg: ^2.2.0

  # File picker
  file_picker: ^10.3.1

  # URL launching
  url_launcher: ^6.3.2

  # File system paths
  path_provider: ^2.1.5

  # JSON model annotations — version pinned for compatibility
  json_annotation: ^4.8.1

  # Connectivity checks
  connectivity_plus: ^6.1.5

  # Local key-value storage
  shared_preferences: ^2.5.3

  # Permission handling
  permission_handler: ^12.0.1

  # Icons
  font_awesome_flutter: ^10.9.0

  # Local/Push notifications
  awesome_notifications: ^0.10.1

  # Web URL strategy (remove hash #)
  url_strategy: ^0.3.0

  # Navigation
  go_router: ^16.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  mocktail: ^1.0.4

  # Linting rules
  flutter_lints: ^5.0.0

  # Code generation runner
  build_runner: ^2.4.11

  # JSON serialization generator
  json_serializable: ^6.6.2 # Matches json_annotation ^4.8.x

  # Flutter app icon generator — compatible version
  flutter_launcher_icons: ^0.13.1

  # Splash screen generator
  flutter_native_splash: ^2.4.6

  # Hive type adapter generator
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/images/icons/
    - assets/images/graphics/

  fonts:
    - family: Signika
      fonts:
        - asset: assets/fonts/Signika.ttf

    - family: Fira
      fonts:
        - asset: assets/fonts/Fira/FiraSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/Fira/FiraSans-BoldItalic.ttf
          weight: 700
        - asset: assets/fonts/Fira/FiraSans-Regular.ttf
          weight: 400

    - family: Sarabun
      fonts:
        - asset: assets/fonts/Sarabun/Sarabun-Bold.ttf
          weight: 700
        - asset: assets/fonts/Sarabun/Sarabun-Medium.ttf
          weight: 500
        - asset: assets/fonts/Sarabun/Sarabun-MediumItalic.ttf
          weight: 500
        - asset: assets/fonts/Sarabun/Sarabun-Regular.ttf
          weight: 400
